services:
  - type: web
    name: luxdevhq-ai-tutor-api
    env: docker
    plan: starter
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: ALLOWED_ORIGINS
        value: https://luxdevhq.ai,https://www.luxdevhq.ai,http://localhost:3000
